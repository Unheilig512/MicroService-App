spring.application.name=Profile-Service


#-----------------------------Server------------------------------
server.port = 8083
eureka.client.enabled=true
eureka.client.serviceUrl.defaultZone=http://eureka-server:8761/eureka/


#----------------------------Kafka--------------------------------
spring.kafka.bootstrap-servers=localhost:9092

# ?????? ??? ?????? (????? ????? ?? ??????????????)
spring.kafka.consumer.group-id=profile-registration-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# ????????? ?????? (????????? ?????)
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer


#--------------------------Data-Bases-----------------------------
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

spring.datasource.url=jdbc:postgresql://host.docker.internal:5435/postgres
#spring.datasource.url=jdbc:postgresql://localhost:5435/postgres
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

minio.url=http://localhost:9000
minio.accessKey=minioadmin
minio.secretKey=minioadmin
minio.bucketName=news-images
